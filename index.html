/* =============================================================
   STILL — calming, centering, grounding
   ============================================================= */
const BREATH_PATTERNS = [
  { id: 'coherent', name: 'Slow 5 · 5', steps: [['Breathe in', 5, 1], ['Breathe out', 5, 0.68]],
    note: 'Five in, five out. The simplest one — good as a default.' },
  { id: 'box', name: 'Box 4 · 4 · 4 · 4', steps: [['Breathe in', 4, 1], ['Hold', 4, 1], ['Breathe out', 4, 0.68], ['Hold', 4, 0.68]],
    note: 'In, hold, out, hold. Four steady walls around the moment.' },
  { id: '478', name: '4 · 7 · 8', steps: [['Breathe in', 4, 1], ['Hold', 7, 1], ['Breathe out', 8, 0.68]],
    note: 'The long exhale is the off-switch. Strong — three or four rounds is plenty.' }
];
let breathTimer = null, breathTick = null, breathRunning = false, breathPattern = 'coherent';

const BREATH_LAYERS = [['breath-core', 0.72], ['breath-r3', 0.84], ['breath-r2', 1], ['breath-r1', 1.18]];

function setBreathScale(scale, secs) {
  BREATH_LAYERS.forEach(([id, mult]) => {
    const el = document.getElementById(id);
    if (el) {
      el.style.transitionDuration = (Math.round(secs * mult * 100) / 100) + 's';
      el.style.transform = 'scale(' + scale + ')';
    }
  });
}

function stopBreath() {
  breathRunning = false;
  clearTimeout(breathTimer); clearInterval(breathTick);
  breathTimer = null; breathTick = null;
  setBreathScale(0.68, 1.2);
  const bsq = document.getElementById('breath-square');
  if (bsq) { bsq.style.transition = 'opacity .6s ease'; bsq.style.opacity = 0; }
  const stage = document.getElementById('breath-stage');
  if (stage) stage.classList.remove('inhaling', 'holding', 'exhaling', 'boxmode');
  const lb = document.getElementById('breath-label');
  const ct = document.getElementById('breath-count');
  const btn = document.getElementById('breath-toggle');
  if (lb) lb.textContent = 'Ready when you are';
  if (ct) ct.textContent = '';
  if (btn) btn.textContent = 'Begin';
}

/* Box breathing: the square draws one side per phase, then fades and begins again */
function updateBreathSquare(stepIdx, secs) {
  const wrap = document.getElementById('breath-square');
  const sq = document.getElementById('bsq-rect');
  if (!wrap || !sq) return;
  if (breathPattern !== 'box' || !breathRunning) { wrap.style.transition = 'opacity .5s ease'; wrap.style.opacity = 0; return; }
  const P = (sq.getTotalLength ? sq.getTotalLength() : 576);
  sq.style.strokeDasharray = P;
  const seg = stepIdx % 4;
  if (seg === 0) {
    /* let the finished square dissolve, then start drawing the first side */
    wrap.style.transition = 'opacity .45s ease';
    wrap.style.opacity = 0;
    setTimeout(() => {
      if (!breathRunning || breathPattern !== 'box') return;
      sq.style.transition = 'none';
      sq.style.strokeDashoffset = P;
      void sq.getBoundingClientRect();
      wrap.style.transition = 'opacity .35s ease';
      wrap.style.opacity = 1;
      sq.style.transition = 'stroke-dashoffset ' + Math.max(0.2, secs - 0.85) + 's linear';
      sq.style.strokeDashoffset = P * 0.75;
    }, 480);
  } else {
    wrap.style.opacity = 1;
    sq.style.transition = 'stroke-dashoffset ' + secs + 's linear';
    sq.style.strokeDashoffset = P * (1 - (seg + 1) / 4);
  }
}

function runBreathStep(stepIdx) {
  if (!breathRunning) return;
  const pattern = BREATH_PATTERNS.find(x => x.id === breathPattern) || BREATH_PATTERNS[0];
  const [label, secs, scale] = pattern.steps[stepIdx % pattern.steps.length];
  const lb = document.getElementById('breath-label');
  const ct = document.getElementById('breath-count');
  const stage = document.getElementById('breath-stage');
  if (!lb || !stage) { stopBreath(); return; }
  lb.textContent = label;
  stage.classList.remove('inhaling', 'holding', 'exhaling');
  stage.classList.add(label === 'Breathe in' ? 'inhaling' : label === 'Hold' ? 'holding' : 'exhaling');
  stage.classList.toggle('boxmode', breathPattern === 'box');
  setBreathScale(scale, secs);
  updateBreathSquare(stepIdx, secs);
  let remaining = secs;
  if (ct) ct.textContent = remaining;
  clearInterval(breathTick);
  breathTick = setInterval(() => {
    remaining -= 1;
    if (ct && remaining > 0) ct.textContent = remaining;
  }, 1000);
  breathTimer = setTimeout(() => runBreathStep(stepIdx + 1), secs * 1000);
}

function renderStill() {
  const pattern = BREATH_PATTERNS.find(x => x.id === breathPattern) || BREATH_PATTERNS[0];
  let html = '<h2 class="view-title">still</h2>' +
    '<p class="view-sub">Nothing on this page needs anything from you. It’s here to sit with you until the wave passes — and it always passes.</p>';

  /* Breathing */
  const petalWheel = (cls, id, startDeg, radius) => {
    let p = '';
    for (let i = 0; i < 6; i++) p += '<div class="petal" style="transform:rotate(' + (startDeg + i * 60) + 'deg) translateY(-' + radius + 'px);"></div>';
    return '<div class="breath-ring petals ' + cls + '" id="' + id + '"><div class="spin">' + p + '</div></div>';
  };
  html += '<div class="card"><div class="card-title">Breathe with the mandala</div>' +
    '<div class="chips" id="breath-patterns">' +
    BREATH_PATTERNS.map(x => '<span class="chip' + (x.id === breathPattern ? ' selected' : '') + '" data-bp="' + x.id + '">' + x.name + '</span>').join('') +
    '</div>' +
    '<p class="small" style="margin:12px 0 0;">' + pattern.note + '</p>' +
    '<div class="breath-stage" id="breath-stage">' +
    '<div class="breath-rings"><div class="breath-halo"></div>' +
    '<svg class="breath-square" id="breath-square" viewBox="0 0 184 184" aria-hidden="true">' +
    '<defs><linearGradient id="bsq-grad" x1="0" y1="0" x2="1" y2="1">' +
    '<stop offset="0" style="stop-color:var(--b1)"/><stop offset="1" style="stop-color:var(--b2)"/></linearGradient></defs>' +
    '<rect id="bsq-rect" x="14" y="14" width="156" height="156" rx="18" fill="none" stroke="url(#bsq-grad)" stroke-width="2.5" stroke-linecap="round"/></svg>' +
    '<div id="breath-scale">' +
    petalWheel('p1', 'breath-r1', 0, 52) +
    petalWheel('p2', 'breath-r2', 30, 40) +
    '<div class="breath-ring ring-line" id="breath-r3"></div>' +
    '<div class="breath-core" id="breath-core"></div></div></div>' +
    '<div class="breath-label" id="breath-label">Ready when you are</div>' +
    '<div class="breath-count caption" id="breath-count"></div>' +
    '<div class="btn-row" style="margin-top:16px;"><button class="primary" id="breath-toggle" style="min-width:140px;">Begin</button></div>' +
    '</div></div>';

  /* Grounding */
  html += '<div class="card"><div class="card-title">Come back to the room</div>' +
    '<p style="margin:0 0 12px;">5 · 4 · 3 · 2 · 1 — slowly, naming each one:</p>' +
    '<ul class="plain">' +
    '<li><strong>5</strong> things you can see — let your eyes actually rest on each</li>' +
    '<li><strong>4</strong> things you can feel — the chair, the fabric, your own weight</li>' +
    '<li><strong>3</strong> things you can hear — near, far, inside</li>' +
    '<li><strong>2</strong> things you can smell</li>' +
    '<li><strong>1</strong> thing you can taste, or one slow breath</li></ul>' +
    '<hr class="soft">' +
    '<p class="small" style="margin:0;">An urge is a wave: it rises, crests, and falls on its own in roughly 90 seconds — if it isn’t fed or fought. Name what you feel in one word, put a hand somewhere kind, and let the clock do the work. You’ve outlasted every single one so far. The proof is that you’re reading this.</p></div>';

  /* What helps — editable */
  html += '<div class="card"><div class="card-title">What helps — your list</div>' +
    '<p class="small" style="margin:0 0 8px;">Yours to edit. When everything is loud, pick the one that asks the least.</p>' +
    '<div id="relief-rows">' +
    reliefList().map((r, i) => '<div class="relief-row"><span class="rtext">' + esc(r) + '</span><button class="rdel" data-rdel="' + i + '" title="remove">×</button></div>').join('') +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-top:12px;"><input type="text" id="relief-new" placeholder="Add something that helps…" style="flex:1;">' +
    '<button class="small" id="relief-add">Add</button></div></div>';

  html += '<div class="card soft"><div class="card-title">And if none of it works tonight</div>' +
    '<p class="small" style="margin:0;">Then nothing has failed — least of all you. Locks on, lights off, bed. Tell Dillon one true sentence. The night ends the same way either way: with morning, and four ordinary meals, and another chance to be gentle. Nothing needs to be solved before then.</p></div>';

  document.getElementById('view-still').innerHTML = html;
  bindStill();
}

function bindStill() {
  const root = document.getElementById('view-still');
  root.querySelectorAll('[data-bp]').forEach(ch => ch.addEventListener('click', () => {
    breathPattern = ch.dataset.bp;
    const wasRunning = breathRunning;
    stopBreath();
    renderStill();
    if (wasRunning) {
      breathRunning = true;
      document.getElementById('breath-toggle').textContent = 'Rest';
      runBreathStep(0);
    }
  }));
  root.querySelector('#breath-toggle').addEventListener('click', () => {
    if (breathRunning) { stopBreath(); return; }
    breathRunning = true;
    document.getElementById('breath-toggle').textContent = 'Rest';
    runBreathStep(0);
  });
  root.querySelectorAll('[data-rdel]').forEach(b => b.addEventListener('click', () => {
    const list = reliefList();
    list.splice(Number(b.dataset.rdel), 1);
    state.config.reliefList = list;
    saveState(); renderStill();
  }));
  const add = () => {
    const inp = root.querySelector('#relief-new');
    const v = inp.value.trim();
    if (!v) return;
    const list = reliefList();
    list.push(v);
    state.config.reliefList = list;
    saveState(); renderStill();
    toast('Added to your list.');
  };
  root.querySelector('#relief-add').addEventListener('click', add);
  root.querySelector('#relief-new').addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
}

/* =============================================================
   Exports — JSON (machine), HTML keepsake (human), CSV (spreadsheet)
   ============================================================= */
function downloadFile(name, content, type) {
  const blob = new Blob([content], { type: type || 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
  state.config.lastExportAt = new Date().toISOString();
  saveState({ quiet: true });
}

function buildArchiveHtml() {
  const items = archItems().slice().reverse(); // oldest first — it reads as a book
  let body = '', lastMonth = '';
  items.forEach(it => {
    const month = fmtDate(it.date, { month: 'long', year: 'numeric' });
    if (month !== lastMonth) { body += '<h2>' + esc(month) + '</h2>'; lastMonth = month; }
    const dateLine = '<div class="d">' + esc(fmtDate(it.date)) + '</div>';
    if (it.kind === 'day') {
      const d = it.obj, i = intakeOf(d), n = netOf(d);
      const bits = [];
      if (d.untracked) bits.push('untracked, on purpose');
      else if (i != null) bits.push(i + ' kcal in' + (n != null ? ' · net ' + (n > 0 ? '+' : '') + n : ''));
      if (d.steps != null) bits.push(Number(d.steps).toLocaleString() + ' steps');
      if (d.workoutText) bits.push(esc(d.workoutText));
      (d.sessions || []).forEach(x => bits.push(esc(x.type) + (x.mins ? ' · ' + x.mins + ' min' : '') + (x.detail ? ' (' + esc(x.detail) + ')' : '')));
      const kept = ANCHORS.filter(a => d.anchors && d.anchors[a.id]).length;
      const focus = Object.values(d.focusTexts || {}).map(f => esc(f.text));
      body += '<div class="card day">' + dateLine +
        (bits.length ? '<p>' + bits.join(' · ') + '</p>' : '') +
        '<p class="m">Anchors ' + kept + '/' + ANCHORS.length +
        ((d.habits || []).length ? ' · ' + d.habits.map(esc).join(', ') : '') +
        (feelLabels(d).length ? ' · felt ' + esc(feelLabels(d).join(', ')) : '') + (d.feelWord ? ' — “' + esc(d.feelWord) + '”' : '') +
        (d.hard || d.night ? ' · a hard moment, named' : '') + (d.rest ? ' · rest day' : '') + '</p>' +
        (focus.length ? '<p class="m">Focuses: ' + focus.join(' / ') + '</p>' : '') +
        (d.note ? '<p class="note">' + esc(d.note) + '</p>' : '') + '</div>';
    } else if (it.kind === 'reflection') {
      const j = it.obj;
      body += '<div class="card refl">' + dateLine +
        (j.prompt ? '<p class="prompt">' + esc(j.prompt) + '</p>' : '') +
        '<p class="note">' + esc(j.text) + '</p></div>';
    } else if (it.kind === 'note') {
      const j = it.obj;
      body += '<div class="card page">' + dateLine +
        (j.img ? '<img src="' + j.img + '">' : '') +
        (j.text ? '<p class="note">' + esc(j.text) + '</p>' : '') + '</div>';
    } else {
      const w = it.obj;
      body += '<div class="card win">' + dateLine + '<p class="note">' + esc(w.text) + ' <span class="tag">' + esc(w.tag) + '</span></p></div>';
    }
  });
  return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Tend — the record</title>' +
    '<meta name="viewport" content="width=device-width, initial-scale=1"><style>' +
    'body{font-family:Georgia,serif;max-width:680px;margin:0 auto;padding:32px 20px;background:#f6f4f1;color:#2a282c;line-height:1.55;}' +
    'h1{font-weight:500;}h2{font-weight:500;margin:40px 0 16px;border-bottom:1px solid #d9d4cd;padding-bottom:8px;}' +
    '.card{background:#fbfaf8;border:1px solid #e3dfd9;border-radius:10px;padding:16px;margin-bottom:12px;}' +
    '.d{font-family:Menlo,monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8b878e;margin-bottom:8px;}' +
    '.m{font-size:13px;color:#56505a;margin:4px 0;}p{margin:4px 0;}' +
    '.note{white-space:pre-wrap;}.prompt{font-style:italic;color:#553c50;border-left:2px solid #7e5a78;padding-left:12px;}' +
    '.refl{border-left:3px solid #7e5a78;}.win{border-left:3px solid #75826a;}' +
    '.tag{font-family:Menlo,monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;background:#ece3ea;color:#553c50;border-radius:99px;padding:2px 8px;}' +
    'img{max-width:100%;border-radius:8px;margin:8px 0;}' +
    '</style></head><body><h1>Tend — ' + esc(state.config.name) + '’s record</h1>' +
    '<p class="m">Exported ' + esc(new Date().toLocaleString()) + ' · ' + items.length + ' entries. This file is complete in itself — it opens in any browser, forever.</p>' +
    body + '</body></html>';
}

function csvCell(v) {
  if (v == null) return '';
  const x = String(v);
  return /[",\n]/.test(x) ? '"' + x.replace(/"/g, '""') + '"' : x;
}
function buildDaysCsv() {
  const cols = ['date','intake','protein','expend','net','steps','workout','move types','sessions','anchors kept','care kept','extras','habits','feel','feel word','hard','night','rest','untracked','focuses done','note'];
  const rows = [cols.join(',')];
  Object.values(state.days)
    .filter(d => dayHasData(d) || (d.focusDone || []).length)
    .sort((a, b) => a.date.localeCompare(b.date))
    .forEach(d => {
      rows.push([
        d.date, intakeOf(d), d.protein, d.expend, netOf(d), d.steps, d.workoutText,
        (d.moveTypes || []).join('; '),
        (d.sessions || []).map(x => x.type + (x.mins ? ' ' + x.mins + 'min' : '') + (x.detail ? ' [' + x.detail + ']' : '')).join('; '),
        ANCHORS.filter(a => d.anchors && d.anchors[a.id]).map(a => a.id).join('; '),
        CARE_MIN.filter(c => d.care && d.care[c.id]).map(c => c.id).join('; '),
        (d.extraCare || []).join('; '),
        (d.habits || []).join('; '),
        feelList(d).join('; '), d.feelWord,
        d.hard ? 1 : '', d.night ? 1 : '', d.rest ? 1 : '', d.untracked ? 1 : '',
        Object.values(d.focusTexts || {}).map(f => f.text).join('; '),
        d.note
      ].map(csvCell).join(','));
    });
  return rows.join('\n');
}

function bindSettings() {
  const root = document.getElementById('view-settings');
  const cfg = state.config;
  root.querySelector('#settings-close').addEventListener('click', () =>
    switchView(settingsReturnTo && settingsReturnTo !== 'settings' ? settingsReturnTo : 'today'));
  root.onchange = (e) => {
    const t = e.target; if (!t || !t.id) return;
    const num = v => v === '' ? 0 : Number(v);
    const map = { 's-imin': 'intakeMin', 's-imax': 'intakeMax', 's-idmin': 'idealMin', 's-idmax': 'idealMax',
                  's-cap': 'deficitCap', 's-snack': 'snackCap', 's-bmr': 'bmr', 's-neat': 'neat' };
    if (t.id === 's-name') { cfg.name = t.value.trim() || 'Isabel'; saveState(); }
    else if (map[t.id]) { cfg[map[t.id]] = num(t.value); saveState(); }
    else if (t.id === 's-large') { cfg.typeLarge = t.checked; saveState(); applyAppearance(); }
    else if (t.id === 's-crisp') { cfg.contrastCrisp = t.checked; saveState(); applyAppearance(); }
  };
  const sheetIn = root.querySelector('#s-sheet');
  if (sheetIn) sheetIn.addEventListener('change', () => {
    cfg.sheetUrl = sheetIn.value.trim();
    saveState();
    updateSyncIndicator(cfg.sheetUrl ? 'offline' : 'offline');
    const st = root.querySelector('#s-sync-status');
    if (st) st.textContent = syncStatusText();
  });
  const testBtn = root.querySelector('#s-test');
  if (testBtn) testBtn.addEventListener('click', async () => {
    root.querySelector('#s-test-result').textContent = 'Testing…';
    const r = await pullFromSheet();
    if (r.ok) renderSettings();
    const out = document.querySelector('#s-test-result');
    if (out) out.textContent = r.ok
      ? '✓ Connected. The sheet answered and anything on it was merged in.'
      : '✗ ' + (r.error || 'No luck — check the URL ends in /exec and access is set to “Anyone”.');
  });
  const pullBtn = root.querySelector('#s-pull');
  if (pullBtn) pullBtn.addEventListener('click', async () => {
    const r = await pullFromSheet();
    toast(r.ok ? 'Pulled from the sheet.' : 'Pull failed: ' + (r.error || ''));
    if (r.ok) renderSettings();
  });
  const syncBtn = root.querySelector('#s-syncnow');
  if (syncBtn) syncBtn.addEventListener('click', async () => {
    await flushSync();
    const st = root.querySelector('#s-sync-status');
    if (st) st.textContent = syncStatusText();
    toast(state.config.sheetUrl ? 'Sync attempted — see status above.' : 'Add the sheet URL first.');
  });
  const copyBtn = root.querySelector('#s-copy-script');
  if (copyBtn) copyBtn.addEventListener('click', () => {
    const doneMsg = () => toast('Script copied — paste it into Apps Script.');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(APPS_SCRIPT_SRC).then(doneMsg, () => fallbackCopy());
    } else fallbackCopy();
    function fallbackCopy() {
      const ta = document.createElement('textarea');
      ta.value = APPS_SCRIPT_SRC;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); doneMsg(); } catch (e) { toast('Couldn’t copy — select the text by hand.'); }
      document.body.removeChild(ta);
    }
  });

  root.querySelectorAll('[data-theme]').forEach(ch => ch.addEventListener('click', () => {
    cfg.theme = ch.dataset.theme; saveState(); applyAppearance(); renderSettings();
  }));
  const bk = document.getElementById('s-backup');
  if (bk) bk.addEventListener('click', () => {
    const data = { app: 'tend', exportedAt: new Date().toISOString(), days: state.days, journal: state.journal, wins: state.wins, journey: state.journey, config: state.config };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tend-backup-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
    toast('Backed up — keep it somewhere kind.');
  });
  root.querySelector('#s-export').addEventListener('click', () => {
    downloadFile('tend-backup-' + todayStr() + '.json', JSON.stringify(state, null, 2), 'application/json');
    toast('Full backup saved.'); renderSettings();
  });
  root.querySelector('#s-export-html').addEventListener('click', () => {
    downloadFile('tend-keepsake-' + todayStr() + '.html', buildArchiveHtml(), 'text/html;charset=utf-8');
    toast('Keepsake saved — it opens anywhere, forever.'); renderSettings();
  });
  root.querySelector('#s-export-csv').addEventListener('click', () => {
    downloadFile('tend-days-' + todayStr() + '.csv', buildDaysCsv(), 'text/csv;charset=utf-8');
    toast('Daily log CSV saved.'); renderSettings();
  });
  root.querySelector('#s-import').addEventListener('click', () => root.querySelector('#s-import-file').click());
  root.querySelector('#s-import-file').addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== 'object' || !parsed.config) throw new Error('bad file');
        state = { ...state, ...parsed, config: { ...DEFAULT_CONFIG, ...parsed.config } };
        saveState(); applyAppearance(); renderActiveView();
        toast('Imported. Welcome back.');
      } catch (err) { toast('That file didn’t look like a Tend export.'); }
    };
    reader.readAsText(f);
  });
  root.querySelector('#s-wipe').addEventListener('click', () => {
    openModal('<div class="modal-head"><h2>Erase everything?</h2><button class="x-btn" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
      '<div class="modal-body"><p>All logs, journal pages, evidence, and journey progress on this device will be gone. There is no undo here — though if you’ve connected a Google Sheet, everything already synced is still safe there and can be pulled back. Consider exporting first anyway.</p></div>' +
      '<div class="modal-foot"><button onclick="closeModal()">Keep my data</button><button class="subtle-warn" id="wipe-confirm">Erase</button></div>', { sticky: true });
    document.getElementById('wipe-confirm').addEventListener('click', () => {
      localStorage.removeItem(LS_KEY);
      location.reload();
    });
  });
}

function applyAppearance() {
  const cfg = state.config;
  document.documentElement.className =
    (cfg.theme && cfg.theme !== 'default' ? 'theme-' + cfg.theme : '') +
    (cfg.typeLarge ? ' type-large' : '') +
    (cfg.contrastCrisp ? ' contrast-crisp' : '');
}

/* =============================================================
   First run
   ============================================================= */
function openFirstRun() {
  let chosenPhase = 1;
  openModal(
    '<div class="modal-head"><h2>Hello.</h2></div>' +
    '<div class="modal-body">' +
    '<p class="gentle-line" style="font-size:var(--fs-lg);">This is Tend — your plan, turned into a place you can live in.</p>' +
    '<p>Everything is here: the anchors, the ranges, the calculators, the goals. Plus a journal, an evidence log, and a five-phase path from <em>stable</em> to <em>a life that’s yours</em>.</p>' +
    '<label class="field"><span class="lbl">What should it call you?</span><input type="text" id="fr-name" value="Isabel"></label>' +
    '<div class="field"><span class="lbl">Where does it feel right to begin?</span><div id="fr-phases">' +
    PHASES.map(p => '<label class="check-row"><input type="radio" name="fr-phase" value="' + p.n + '"' + (p.n === 1 ? ' checked' : '') + '>' +
      '<span class="box" style="border-radius:50%;"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg></span>' +
      '<span class="txt"><span class="main"><strong>' + p.n + ' · ' + p.name + '</strong></span><span class="why">' + esc(p.intent) + '</span></span></label>').join('') +
    '</div><span class="help">You’ve been doing this work already — start where it is honest</span></div>' +
    '</div>' +
    '<div class="modal-foot"><button class="primary" id="fr-begin">Begin gently</button></div>',
    { sticky: true, full: true }
  );
  document.getElementById('fr-begin').addEventListener('click', () => {
    const name = document.getElementById('fr-name').value.trim() || 'Isabel';
    const sel = document.querySelector('input[name="fr-phase"]:checked');
    chosenPhase = sel ? Number(sel.value) : 1;
    state.config.name = name;
    state.config.firstRunComplete = true;
    state.journey.phase = chosenPhase;
    state.journey.phaseStarted = todayStr();
    state.journey.startDate = todayStr();
    state.journey.settled = [];
    for (let i = 1; i < chosenPhase; i++) state.journey.settled.push(i);
    saveState();
    closeModal();
    renderActiveView();
    toast('Welcome, ' + name + '. Phase ' + chosenPhase + ': ' + currentPhase().name + '.');
  });
}

/* =============================================================
   Init
   ============================================================= */
function init() {
  loadState();
  applyAppearance();

  document.querySelectorAll('#bottom-tabs button').forEach(b => {
    b.addEventListener('click', () => switchView(b.dataset.view));
  });
  document.getElementById('open-settings').addEventListener('click', () => switchView('settings'));
  document.getElementById('phase-pill').addEventListener('click', () => switchView('journey'));

  window.addEventListener('scroll', () => {
    document.getElementById('top-bar').classList.toggle('scrolled', window.scrollY > 4);
  });

  updateSyncIndicator(state.config.sheetUrl ? 'syncing' : 'offline');
  if (state.config.sheetUrl) {
    pullFromSheet().then(() => { renderActiveView(); flushSync(); });
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state.config.sheetUrl) flushSync();
  });
  window.addEventListener('online', () => { if (state.config.sheetUrl) flushSync(); });

  if (state.config.firstRunComplete) maybeWeeklyLetter();
  if (!state.config.firstRunComplete) openFirstRun();
  renderActiveView();
}
document.addEventListener('DOMContentLoaded', init);
