        '<div class="small" style="text-align:right;font-style:italic;color:var(--muted);margin:4px 0 0;">take your time with it</div></div>'
      : '<button class="eb-btn" id="today-reading-write">write from this</button></div></div>');

  document.getElementById('view-today').innerHTML = html;
  bindToday(date);
}

function bindToday(date) {
  const root = document.getElementById('view-today');
  const day = getDay(date);

  root.querySelectorAll('[data-go]').forEach(b => b.addEventListener('click', () => switchView(b.dataset.go)));

  const shuffle = root.querySelector('#shuffle-focus');
  if (shuffle) shuffle.addEventListener('click', () => {
    day._focusShift = ((day._focusShift || 0) + 3) % currentPhase().focuses.length;
    saveState();
    renderToday();
  });

  const trw = root.querySelector('#today-reading-write');
  if (trw) trw.addEventListener('click', () => {
    const wr2 = weeklyReading(todayStr());
    pendingSelides = { prompt: wr2.q, tag: wr2.th, src: wr2.t + ' — ' + wr2.a };
    switchView('selides');
  });

  bindTodayCommon(root, date);
}

function bindTodayCommon(root, date) {
  const day = getDay(date);

  // focuses (onchange assignment: replaces, never accumulates across re-renders)
  root.onchange = (e) => {
    const t = e.target;
    if (!t || !t.id) return;
    if (t.id.startsWith('focus-')) {
      const idx = Number(t.id.slice(6));
      const pool = currentPhase().focuses;
      if (!day.focusTexts) day.focusTexts = {};
      if (t.checked) {
        if (!day.focusDone.includes(idx)) day.focusDone.push(idx);
        if (pool[idx]) day.focusTexts[idx] = { text: pool[idx].x, theme: pool[idx].th };
      } else {
        day.focusDone = day.focusDone.filter(i => i !== idx);
        delete day.focusTexts[idx];
      }
      saveState();
    }
    if (t.id.startsWith('anchor-')) {
      day.anchors[t.id.slice(7)] = t.checked; saveState();
      const did = ANCHORS.filter(a => day.anchors[a.id]).length;
      if (did === ANCHORS.length) toast('All six anchors. The ground is solid today.');
    }
    if (t.id.startsWith('care-')) { day.care[t.id.slice(5)] = t.checked; saveState(); }
    if (t.id.startsWith('meal-')) {
      const k = t.id.slice(5);
      day.meals[k] = t.value === '' ? null : Number(t.value);
      saveState(); renderToday();
    }
    if (t.id === 't-steps')  { day.steps = t.value === '' ? null : Number(t.value); saveState(); }
    if (t.id === 't-expend') { day.expend = t.value === '' ? null : Number(t.value); saveState(); renderToday(); }
    if (t.id === 't-workout'){ day.workoutText = t.value; saveState(); }
    if (t.id === 't-feelword'){ day.feelWord = t.value; saveState(); }
  };

  root.querySelectorAll('[data-feel]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.feel;
    const cur = feelList(day);
    day.feel = cur.includes(id) ? cur.filter(x => x !== id) : cur.concat(id);
    saveState(); renderToday();
  }));

  root.querySelectorAll('[data-move]').forEach(ch => ch.addEventListener('click', () => {
    const m = ch.dataset.move;
    if (day.moveTypes.includes(m)) day.moveTypes = day.moveTypes.filter(x => x !== m);
    else day.moveTypes.push(m);
    saveState(); renderToday();
  }));
  const addSess = root.querySelector('#t-add-session');
  if (addSess) addSess.addEventListener('click', () => openSessionModal(date));
  root.querySelectorAll('[data-delsession]').forEach(b => b.addEventListener('click', () => {
    day.sessions = day.sessions.filter(x => x.id !== b.dataset.delsession);
    saveState(); renderToday();
  }));

  root.querySelectorAll('[data-flag]').forEach(ch => ch.addEventListener('click', () => {
    day[ch.dataset.flag] = !day[ch.dataset.flag];
    saveState(); renderToday();
  }));

  root.querySelectorAll('[data-habit]').forEach(ch => ch.addEventListener('click', () => {
    const h = ch.dataset.habit;
    if (day.habits.includes(h)) day.habits = day.habits.filter(x => x !== h);
    else day.habits.push(h);
    saveState(); renderToday();
  }));

  root.querySelectorAll('[data-extra]').forEach(ch => ch.addEventListener('click', () => {
    const c = ch.dataset.extra;
    if (day.extraCare.includes(c)) day.extraCare = day.extraCare.filter(x => x !== c);
    else day.extraCare.push(c);
    saveState(); renderToday();
  }));

  const saveRef = root.querySelector('#save-reflection');
  if (saveRef) saveRef.addEventListener('click', () => {
    const text = root.querySelector('#t-reflection').value.trim();
    if (!text) { toast('Nothing to save yet — even one line counts.'); return; }
    let entry = state.journal.find(j => j.date === date && j.kind === 'reflection');
    if (entry) { entry.text = text; entry.prompt = promptForDate(date); }
    else state.journal.unshift({ id: uuid(), date, kind: 'reflection', prompt: promptForDate(date), text });
    saveState(); toast('Reflection kept.'); renderToday();
  });

  const un = root.querySelector('#untrack-today');
  if (un) un.addEventListener('click', () => { day.untracked = true; saveState(); renderToday(); toast('Untracked. Trust is also a practice.'); });
  const undo = root.querySelector('#untrack-undo');
  if (undo) undo.addEventListener('click', () => { day.untracked = false; saveState(); renderToday(); });
}

  html += '<div class="card"><div class="card-title">The day, honestly</div>';

  if (day.rest) {
    html += '<div class="banner kind">A rest day. The most difficult practice.</div>';
  }
  html += '</div>';

  /* Note to self */
  html += '<div class="card"><div class="card-title">Note to self</div>' +
    '<textarea id="le-note" placeholder="Anything worth remembering about this day.">' + esc(day.note) + '</textarea></div>';

  return html;
}

function renderWeekSummary(date) {
  // week = the 7 days ending on `date`
  const cfg = state.config;
  let intakeDays = 0, intakeSum = 0, netSum = 0, netDays = 0, anchorsKept = 0, anchorsTotal = 0,
      hardDays = 0, restDays = 0, stepsSum = 0, stepsDays = 0, habitCount = 0;
  for (let i = 0; i < 7; i++) {
    const d = peekDay(addDays(date, -i));
    if (!d) continue;
    const inV = intakeOf(d);
    if (inV != null) { intakeDays++; intakeSum += inV; }
    const n = netOf(d);
    if (n != null) { netDays++; netSum += n; }
    if (d.hard || d.night) hardDays++;
    if (d.rest) restDays++;
    if (d.steps != null) { stepsDays++; stepsSum += Number(d.steps); }
    habitCount += (d.habits || []).length;
    ANCHORS.forEach(a => { anchorsTotal++; if (d.anchors && d.anchors[a.id]) anchorsKept++; });
  }
  let html = '<div class="card soft"><div class="card-title">This week, gently</div>';
  if (!intakeDays && !netDays && !anchorsKept) {
    html += '<p class="small" style="margin:4px;">Nothing logged in this stretch yet — and that’s information too, not a debt.</p></div>';
    return html;
  }
  html += '<div class="stat-grid">' +
    '<div class="stat-cell"><div class="v">' + (intakeDays ? Math.round(intakeSum / intakeDays) : '—') + '</div><div class="k">avg intake</div></div>' +
    '<div class="stat-cell"><div class="v">' + (netDays ? (Math.round(netSum / netDays) > 0 ? '+' : '') + Math.round(netSum / netDays) : '—') + '</div><div class="k">avg net</div></div>' +
    '<div class="stat-cell"><div class="v">' + (anchorsTotal ? Math.round(anchorsKept / anchorsTotal * 100) + '%' : '—') + '</div><div class="k">anchors</div></div></div>';

  const bits = [];
  if (intakeDays) {
    const avg = Math.round(intakeSum / intakeDays);
    if (avg >= cfg.idealMin) bits.push('You averaged ' + avg + ' kcal — maintenance territory. This is the plan, working.');
    else if (avg >= cfg.intakeMin) bits.push('You averaged ' + avg + ' kcal — inside your range. The next gentle step is nudging toward ' + cfg.idealMin + '.');
    else bits.push('Average intake ran low this week (' + avg + '). Not a failing — a flag. More food is the kindest fix for almost everything on the hard list.');
  }
  if (netDays && Math.round(netSum / netDays) < -cfg.deficitCap) bits.push('The average deficit slipped past your ' + cfg.deficitCap + ' floor. Worth saying out loud to Dillon.');
  if (hardDays) bits.push(hardDays + (hardDays === 1 ? ' hard day' : ' hard days') + ' — followed by ordinary ones. That recovery, not the absence of hard days, is the actual skill.');
  if (restDays) bits.push(restDays + ' real rest day' + (restDays === 1 ? '' : 's') + '. Quietly radical.');
  if (stepsDays && stepsSum / stepsDays > 32000) bits.push('Steps are running high (avg ' + Math.round(stepsSum / stepsDays / 1000) + 'k). The lookahead goal is softer ground — a 10% trim is plenty.');
  if (habitCount) bits.push(habitCount + ' moments that belonged to you this week. Those are load-bearing.');
  else bits.push('No logged minutes for yourself this week. They hold everything else up — even ten count.');
  if (bits.length) html += '<p style="margin:12px 0 0;font-size:var(--fs-body-sm);color:var(--ink-2);">' + bits.map(esc).join(' ') + '</p>';
  html += '</div>';
  return html;
}

      calRef[1] = Number(b.dataset.ym); calMode = 'month'; renderTrends();
    }));
    document.querySelectorAll('[data-cd]').forEach(b => b.addEventListener('click', () => openDayModal(b.dataset.cd)));
    return;
  }

  /* steadiness — under the range pills */
  const today7 = todayStr();
  let kept7 = 0, total7 = 0, careKept7 = 0, careTotal7 = 0, reflections7 = 0;
  for (let i = 0; i < 7; i++) {
    const ds = addDays(today7, -i);
    const d = peekDay(ds);
    ANCHORS.forEach(a => { total7++; if (d && d.anchors && d.anchors[a.id]) kept7++; });
    CARE_MIN.forEach(c => { careTotal7++; if (d && d.care && d.care[c.id]) careKept7++; });
    if (state.journal.some(j => j.date === ds && j.kind === 'reflection')) reflections7++;
  }
  html += '<div class="card wash-heather"><div class="card-title">Steadiness — last 7 days</div><div class="stat-grid">' +
    '<div class="stat-cell"><div class="v">' + Math.round(kept7 / total7 * 100) + '%</div><div class="k">anchors</div></div>' +
    '<div class="stat-cell"><div class="v">' + Math.round(careKept7 / careTotal7 * 100) + '%</div><div class="k">care mins</div></div>' +
    '<div class="stat-cell"><div class="v">' + reflections7 + '/7</div><div class="k">reflections</div></div></div>' +
    '<p class="small" style="margin:12px 0 0;">Consistency here is the quiet driver of everything else. 70% steady beats 100% perfect-then-collapse.</p></div>';



  html += '<div class="card"><div class="card-title">Intake — with your range</div>' +
    (haveCharts ? '<div class="chart-wrap"><canvas id="ch-intake"></canvas></div>'
                : '<div class="chart-fallback">Charts need an internet connection once, then they cache.</div>') +
    '<p class="small" style="margin:12px 0 0;">The shaded band is ' + state.config.intakeMin + '–' + state.config.intakeMax + ' kcal. Living inside it — especially the upper half — is the win condition.</p></div>';

  html += '<div class="card"><div class="card-title">7-day average net</div>' +
    (haveCharts ? '<div class="chart-wrap"><canvas id="ch-net"></canvas></div>' : '') +
    '<p class="small" style="margin:12px 0 0;">Zero is maintenance. The dashed line is your −' + state.config.deficitCap + ' floor: brushing zero is success, not failure.</p></div>';

  html += '<div class="card"><div class="card-title">Steps</div>' +
    (haveCharts ? '<div class="chart-wrap"><canvas id="ch-steps"></canvas></div>' : '') +
    '<p class="small" style="margin:12px 0 0;">The path here is gently downhill — softer ground over time, with rest days that are actually rest.</p></div>';

  /* movement mix */
  const todayD = todayStr();
  const mm = movementMix(todayD);
  const phMove = (currentPhase().move || {});
  const phMix = phMove.mix || {};
  html += '<div class="card wash-neutral"><div class="card-title">Movement mix — last 7 days<span class="caption">phase ' + currentPhase().n + ' mix</span></div>';
  MOVE_TYPES.forEach(m => {
    const target = phMix[m] || MOVE_TARGETS[m];
    html += '<div class="calc-row"><span class="k">' + m +
      (target ? '<span class="sub">' + target + '</span>' : '') +
      '</span><span class="v" style="font-size:var(--fs-caption); color: var(--muted2);">' + mm.mix[m] + (mm.mix[m] === 1 ? ' day' : ' days') + '</span></div>';
  });
  html += '<div class="calc-row mix-close"><span class="k">Rest days<span class="sub">' + esc(phMix['Rest'] || 'they count as training') + '</span></span><span class="v" style="font-size:var(--fs-caption); color: var(--muted2);">' + mm.restDays + (mm.restDays === 1 ? ' day' : ' days') + '</span></div>';
  html += '<div class="card soft" style="margin:20px 0 2px;padding:16px 16px;box-shadow:none;">' +
    '<div class="card-title">A note on movement</div>' +
    '<p class="small" style="margin:0;">' + esc(phMove.note || '') + ' The someday shape — walking most days, yoga 3–5×, strength 3× at 45–60 — arrives phase by phase, on no one’s deadline.</p></div></div>';
  

  document.getElementById('view-trends').innerHTML = html;

  document.querySelectorAll('#trends-tabs button').forEach(b => b.addEventListener('click', () => {
    trendsTab = b.dataset.tt; renderTrends();
  }));
  document.querySelectorAll('[data-range]').forEach(b => b.addEventListener('click', () => {
    trendRange = Number(b.dataset.range); renderTrends();
  }));

  if (haveCharts) drawTrendCharts();
}

/* ---------- Calendar: each day colored by how it was held ---------- */
let calRef = null;
let calMode = 'month';
function yearDotClass(ds) {
  const d = peekDay(ds);
  if (!d || !dayHasData(d)) return '';
  if (d.hard || d.night) return 'yd-amber';
  if (d.rest || d.untracked) return 'yd-plum';
  const cfg = state.config;
  const i = intakeOf(d), n = netOf(d);
  if (i != null && i >= cfg.intakeMin && i <= cfg.intakeMax + 200 && (n == null || n >= -cfg.deficitCap)) return 'yd-sage';
  return 'yd-heather';
}
function yearCard() {
  const y = calRef[0];
  let html = '<div class="card"><div class="card-title">The year, as a field</div>';
  html += '<div class="cal-head"><button class="cal-nav" data-caly="-1">‹</button><span class="cal-title">' + y + '</span><button class="cal-nav" data-caly="1">›</button></div>';
  html += '<div class="yr-grid">';
  for (let m = 0; m < 12; m++) {
    const first = new Date(y, m, 1);
    const dim = new Date(y, m + 1, 0).getDate();
    html += '<div class="yr-month"><button class="yr-name" data-ym="' + m + '">' + first.toLocaleDateString(undefined, { month: 'short' }) + '</button><div class="yr-days">';
    for (let i = 0; i < first.getDay(); i++) html += '<span></span>';
    for (let d = 1; d <= dim; d++) {
      const ds = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      html += '<button class="yr-d ' + yearDotClass(ds) + '" data-cd="' + ds + '" title="' + ds + '"></button>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  html += '<div class="cal-legend">' +
    '<span><span class="cal-dot cd-sage"></span>nourished in range</span>' +
    '<span><span class="cal-dot cd-heather"></span>logged</span>' +
    '<span><span class="cal-dot cd-plum"></span>rest / untracked</span>' +
    '<span><span class="cal-dot cd-amber"></span>hard moment, named</span></div>';
  html += '<p class="small" style="margin:12px 0 0;">Tap a month name to open it; tap any square for that day. The long view the hard nights can’t see.</p></div>';
  return html;
}
/* One dot per life-area that got an entry that day:
   sage = nourishment, heather = movement, plum = inner world,
   gray = anchors held (3+), amber = a hard moment, named. */
function calDayDots(ds) {
  const d = peekDay(ds);
  if (!d) return [];
  const dots = [];
  if (intakeOf(d) != null || d.untracked) dots.push('cd-sage');
  if (d.steps != null || (d.workoutText && d.workoutText.length) || (d.moveTypes || []).length || (d.sessions || []).length || d.rest) dots.push('cd-heather');
  const inner = (d.focusDone || []).length || feelList(d).length || (d.feelWord && d.feelWord.length) ||
    state.journal.some(j => j.date === ds);
  if (inner) dots.push('cd-plum');
  if (ANCHORS.filter(a => d.anchors && d.anchors[a.id]).length >= 3) dots.push('cd-gray');
  if (d.hard || d.night) dots.push('cd-amber');
  return dots;
}
function calendarCard() {
  const now = dateFromStr(todayStr());
  if (!calRef) calRef = [now.getFullYear(), now.getMonth()];
  const [y, m] = calRef;
  const first = new Date(y, m, 1);
  const title = first.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  let html = '<div class="card"><div class="card-title">Calendar — tap a day to revisit it</div>';
  html += '<div class="cal-head"><button class="cal-nav" data-cal="-1">‹</button><span class="cal-title">' + title + '</span><button class="cal-nav" data-cal="1">›</button></div>';
  html += '<div class="cal-grid">';
  ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(d => { html += '<div class="cal-dow">' + d + '</div>'; });
  for (let i = 0; i < first.getDay(); i++) html += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const dots = calDayDots(ds);
    html += '<button class="cal-cell' + (ds === todayStr() ? ' today' : '') + '" data-cd="' + ds + '">' +
      '<span>' + d + '</span><span class="cal-dots">' +
      dots.map(c => '<span class="cal-dot ' + c + '"></span>').join('') +
      '</span></button>';
  }
  html += '</div>';
  html += '<div class="cal-legend">' +
    '<span><span class="cal-dot cd-sage"></span>nourishment</span>' +
    '<span><span class="cal-dot cd-heather"></span>movement</span>' +
    '<span><span class="cal-dot cd-plum"></span>inner world</span>' +
    '<span><span class="cal-dot cd-gray"></span>anchors held</span>' +
    '<span><span class="cal-dot cd-amber"></span>hard moment, named</span>' +
    '</div></div>';
  return html;
}
function kv(k, v) {
  return '<div class="calc-row"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>';
}

    (d.sessions || []).forEach(x2 => move.push(esc(x2.type) + (x2.mins ? ' · ' + x2.mins + ' min' : '') + (x2.effort ? ' · felt ' + effLabel(x2.effort) : '') + (x2.detail ? '<br><span class="small">' + esc(x2.detail) + '</span>' : '')));

    const care = CARE_MIN.filter(c => d.care && d.care[c.id]).map(c => c.label).concat(d.extraCare || []);
    if (care.length) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line);">Care</div><p class="small" style="margin:0 0 15px;">' + care.map(esc).join(' · ') + '</p>';

    const mchD = mealChecksHtml(d);
    if (mchD) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line)">At the table</div>' + mchD;

    if ((d.habits || []).length) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line);">Habits, practices & mind</div><p class="small" style="margin:0 0 15px;">' + d.habits.map(esc).join(' · ') + '</p>';

    const feelBits = [];
    if (feelLabels(d).length) feelBits.push('felt ' + feelLabels(d).join(', '));
    if (d.feelWord) feelBits.push('“' + esc(d.feelWord) + '”');
    DAY_FLAGS.forEach(f => { if (d[f.id]) feelBits.push(f.label); });
    if (feelBits.length) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line);">The day, honestly</div><p class="small" style="margin:0 0 15px;">' + feelBits.join(' · ') + '</p>';

    const ftList = Object.values(d.focusTexts || {});
    if (ftList.length) {
      body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line);">Gentle focuses done</div>' +
        ftList.map(f => '<div style="display:flex;align-items:flex-start;gap:12px;margin:0 0 15px;"><span class="win-tag" style="flex-shrink:0;margin-top:1px;">' + esc(f.theme) + '</span><span class="small">' + esc(f.text) + '</span></div>').join(''); 
    } else if ((d.focusDone || []).length) {
      body += '<p class="small" style="margin:15px 0;">' + d.focusDone.length + ' gentle focus' + (d.focusDone.length === 1 ? '' : 'es') + ' done.</p>';
    }
    if (d.note) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line)">Note to self</div><p style="margin:0 0 15px;white-space:pre-wrap;">' + esc(d.note) + '</p>';

    const ref = state.journal.find(j => j.date === ds && j.kind === 'reflection');
    if (ref) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line);">Reflection</div>' +
      (ref.prompt ? '<p class="gentle-line" style="margin-bottom:8px;font-size:var(--fs-body-sm);">' + esc(ref.prompt) + '</p>' : '') +
      '<p style="margin:0 0 8px;white-space:pre-wrap;">' + esc(ref.text) + '</p>';

    if (wins.length) body += '<div class="section-label" style="margin:12px 0 4px;padding-bottom:2px; border-bottom: 1px dashed var(--line);">Evidence</div>' + wins.map(w => '<p style="margin:0 0 15px;">' + esc(w.text) + ' <span class="win-tag">' + esc(w.tag) + '</span></p>').join('');

  openModal(

  );
  document.getElementById('dm-edit').addEventListener('click', () => {
    closeModal();
    logSelected = ds;
    switchView('log');
  });
}

function trendSeries() {
  const labels = [], intake = [], net7 = [], steps = [];
  const today = todayStr();
  for (let i = trendRange - 1; i >= 0; i--) {
    const ds = addDays(today, -i);
    labels.push(fmtShort(ds));
    const d = peekDay(ds);
    intake.push(d ? intakeOf(d) : null);
    steps.push(d && d.steps != null ? Number(d.steps) : null);
    net7.push(runningAvgNet(ds));
  }
  return { labels, intake, net7, steps };
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function drawTrendCharts() {
  chartRefs.forEach(c => { try { c.destroy(); } catch (e) {} });
  chartRefs = [];
  const s = trendSeries();
  const cfg = state.config;
  const accent = cssVar('--accent'), line = cssVar('--line-2'), muted = cssVar('--muted'),
        success = cssVar('--success'), signal = cssVar('--signal');
  const base = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { intersect: false, mode: 'index' } },
    scales: {
      x: { grid: { display: false }, ticks: { color: muted, maxTicksLimit: 7, font: { size: 10 } } },
      y: { grid: { color: line + '55' }, ticks: { color: muted, font: { size: 10 } } }
    },
    spanGaps: true, animation: { duration: 300 }
  };

  const elI = document.getElementById('ch-intake');
  if (elI) chartRefs.push(new Chart(elI, {
    type: 'line',
    data: { labels: s.labels, datasets: [
      { data: s.labels.map(() => cfg.intakeMax), borderWidth: 0, pointRadius: 0, fill: false },
      { data: s.labels.map(() => cfg.intakeMin), borderWidth: 0, pointRadius: 0, fill: '-1', backgroundColor: success + '22' },
      { data: s.intake, borderColor: accent, backgroundColor: accent, borderWidth: 2, pointRadius: 2.5, tension: 0.3 }
    ]},
    options: { ...base, scales: { ...base.scales, y: { ...base.scales.y, suggestedMin: 800, suggestedMax: cfg.intakeMax + 600 } } }
  }));

  const elN = document.getElementById('ch-net');
  if (elN) chartRefs.push(new Chart(elN, {
    type: 'line',
    data: { labels: s.labels, datasets: [
      { data: s.labels.map(() => 0), borderColor: success, borderWidth: 1.5, pointRadius: 0 },
      { data: s.labels.map(() => -cfg.deficitCap), borderColor: signal, borderDash: [5, 4], borderWidth: 1.5, pointRadius: 0 },
      { data: s.net7, borderColor: accent, borderWidth: 2, pointRadius: 2.5, tension: 0.3 }
    ]},
    options: base
  }));

  const elS = document.getElementById('ch-steps');
  if (elS) chartRefs.push(new Chart(elS, {
    type: 'bar',
    data: { labels: s.labels, datasets: [
      { data: s.steps, backgroundColor: accent + '99', borderRadius: 4 }
    ]},
    options: base
  }));
}

/* =============================================================
   JOURNEY — five phases, advanced by you, not the calendar
   ============================================================= */
function renderJourney() {
  const j = state.journey;
  const cur = j.phase || 1;
  let html = '<h2 class="view-title">the way home</h2>' +
    '<p class="view-sub">From the plan to a life — in five phases. You progress when a stage feels lived-in.</p>';

  html += '<div class="card"><div class="card-title">Eight threads, every phase</div>' +
    '<p class="small" style="margin:0 0 14px;">This was never just about food. The daily focuses rotate across all eight:</p>' +
    '<div class="thread-grid">' +
    THEMES.map(t => '<div class="thread-item"><span class="win-tag">' + t.name + '</span><span>' + esc(t.desc) + '</span></div>').join('') +
    '</div></div>';

  PHASES.forEach(ph => {
    const isCur = ph.n === cur;
    const isSettled = j.settled.includes(ph.n);
    const checks = j.practices['p' + ph.n] || {};
    const done = ph.practices.filter((_, i) => checks[i]).length;
    const pct = Math.round(done / ph.practices.length * 100);

    html += '<div class="stage-card' + (isCur ? ' current' : '') + (isSettled && !isCur ? ' settled' : '') + '">';
    html += '<h4><span class="stage-num">' + ph.n + '</span>' + esc(ph.name) +
      (isSettled ? ' <span class="caption" style="color:var(--success);">· settled</span>' : isCur ? ' <span class="caption" style="color:var(--accent-deep);">· you are here</span>' : '') + '</h4>';
    html += '<div class="meta">' + esc(ph.span) + (isCur && j.phaseStarted ? ' · day ' + (daysInPhase() + 1) + ' of this phase' : '') + '</div>';
    html += '<p class="intent">“' + esc(ph.intent) + '”</p>';

    if (isCur || isSettled) {
      html += '<div class="section-label">Practices to settle into</div>';
      ph.practices.forEach((p, i) => {
        html += checkRow('pr-' + ph.n + '-' + i, p, null, !!checks[i]);
      });
      html += '<div class="progress-track"><div class="fill" style="width:' + pct + '%"></div></div>';
      if (ph.move) {
        html += '<div class="section-label">Movement this phase</div>' +
          '<p class="small" style="margin:2px 0 8px;">' + esc(ph.move.note) + '</p>' +
          '<div class="mix-list">' + Object.keys(ph.move.mix).map(k =>
            '<p style="margin:0 0 4px;font-size:var(--fs-body-sm);color:var(--ink-2);"><strong>' + esc(k) + '</strong> — ' + esc(ph.move.mix[k]) + '</p>').join('') + '</div>';
      }
      html += '<div class="section-label">You’re ready to move on when…</div>' +
        '<p style="font-size:var(--fs-body-sm);margin:4px 0 16px;">' + esc(ph.ready) + '</p>'; 
      if (isCur && ph.n < 5) {
        html += '<div class="btn-row advance-row"><button class="primary small" data-advance="' + ph.n + '">This phase feels settled → begin ' + esc(PHASES[ph.n].name) + '</button>';
        if (ph.n > 1) html += '<button class="small ghost" data-back="' + ph.n + '">step back a phase</button>';
        if (pct < 50) html += '<p class="small no-rush">No rush — fewer than half the practices feel settled yet, and slow is how this sticks.</p>';
        html += '</div>';
      }
      if (isCur && ph.n === 5) {
        html += '<div class="btn-row"><button class="small ghost" data-back="5">step back a phase</button></div>';
      }
    } else {
      html += '<div class="peek-info"><span class="small">' + ph.practices.length + ' practices · unlocks when you get there</span>' +
        '<button class="eb-btn" data-peek="' + ph.n + '">peek ahead</button></div>';
    }
    html += '</div>';
  });

  html += '<div class="card soft"><div class="card-title">A note on moving “backward”</div>' +
    '<p class="small" style="margin:0;">Stress, travel, grief, a bad week — any of these can make an earlier phase the right place to stand for a while. The anchors are always home base. Returning to them on purpose is the most advanced move in this whole app.</p></div>';

  document.getElementById('view-journey').innerHTML = html;
  bindJourney();
}

function bindJourney() {
  const root = document.getElementById('view-journey');
  root.onchange = (e) => {
    const t = e.target;
    if (t && t.id && t.id.startsWith('pr-')) {
      const [, phN, idx] = t.id.split('-');
      const key = 'p' + phN;
      if (!state.journey.practices[key]) state.journey.practices[key] = {};
      state.journey.practices[key][idx] = t.checked;
      saveState();
      const ph = PHASES[Number(phN) - 1];
      const checks = state.journey.practices[key];
      if (ph.practices.every((_, i) => checks[i])) toast('Every practice in ' + ph.name + '. Quietly remarkable.');
    }
  };
  root.querySelectorAll('[data-advance]').forEach(b => b.addEventListener('click', () => {
    const n = Number(b.dataset.advance);
    if (!state.journey.settled.includes(n)) state.journey.settled.push(n);
    state.journey.phase = n + 1;
    state.journey.phaseStarted = todayStr();
    saveState(); renderJourney();
    toast('Welcome to ' + PHASES[n].name + '. Gently does it.');
  }));

function numIn(id, label, val, help) {
  return '<div><span class="mini-lbl">' + label + '</span><input type="number" inputmode="decimal" id="' + id + '" value="' + (val == null || val === '' ? '' : val) + '" placeholder="—">' +
    (help ? '<span class="help" style="display:block;font-size:var(--fs-caption);color:var(--muted);margin-top:3px;">' + help + '</span>' : '') + '</div>';
}

/* "200, 150" -> gross 200, net 150. A single number assumes net = gross - 50
   (the 60-minute resting-burn correction; use the comma for anything else). */
function parseWorkout(raw) {
  const parts = String(raw == null ? '' : raw).split(',')
    .map(x => parseFloat(x)).filter(n => !isNaN(n) && n >= 0);
  if (!parts.length) return { gross: 0, net: 0 };
  const gross = parts[0];
  const net = parts.length > 1 ? parts[1] : Math.max(0, gross - 50);
  return { gross, net };
}

function calcExpenditure() {
  const inc = Number(calcVals.incline) || 0;
  const flat = Number(calcVals.flat) || 0;
  const w = parseWorkout(calcVals.workout);
  const wGross = w.gross;
  const wNet = w.net;
  const neat = Number(calcVals.neat) || 0;
  const bmr = Number(calcVals.bmr) || 0;
  const tef = Math.round(0.1 * (Number(calcVals.intake) || 0));
  const gross    = Math.round(wGross + inc * 70 + flat * 50 + neat + bmr);
  const netSplit = Math.round(wNet + inc * 60 + flat * 40 + neat + tef + bmr);
  const netTm    = Math.round(wNet + (inc + flat) * 50 + neat + tef + bmr);
  const avg = Math.round((gross + netSplit + netTm) / 3);
  return { gross, netSplit, netTm, avg, tef, wNet };
}

function updateCalcResults() {
  const r = calcExpenditure();
  const el = document.getElementById('calc-results');
  if (!el) return;
  el.innerHTML =
    '<div class="calc-row"><span class="k">Gross<span class="sub">no TEF (corrects overestimate) · incline×70 + flat×50</span></span><span class="v">' + r.gross + ' kcal</span></div>' +
    '<div class="calc-row"><span class="k">Net, miles split<span class="sub">adds TEF ' + r.tef + ' · incline×60 + flat×40</span></span><span class="v">' + r.netSplit + ' kcal</span></div>' +
    '<div class="calc-row"><span class="k">Net, treadmill<span class="sub">adds TEF ' + r.tef + ' · all miles×50</span></span><span class="v">' + r.netTm + ' kcal</span></div>' +
    '<div class="calc-row total"><span class="k">Average estimate</span><span class="v">' + r.avg + ' kcal</span></div>';
}

function bikeEstimate() {
  const row = BIKE_TABLE.find(r => r[0] === Number(calcVals.watts)) || BIKE_TABLE[10];
  const f = (Number(calcVals.mins) || 0) / 30;
  return {
    m1g: Math.round(row[1] * f), m1n: Math.round(row[2] * f),
    m2g: Math.round(row[3] * f), m2n: Math.round(row[4] * f),

/* =============================================================
   Weekly letter — synthesis + the week's numbers, written kindly
   ============================================================= */
function lastSundayOnOrBefore(ds) {
  let d = ds, guard = 0;
  while (dateFromStr(d).getDay() !== 0 && guard++ < 8) d = addDays(d, -1);
  return d;
}
function weekStatsFor(weekEnd) {
  const st = { logged: 0, intakeVals: [], netVals: [], anchorsKept: 0, anchorsTotal: 0,
    hard: 0, rest: 0, untracked: 0, habits: 0, focuses: 0, refl: 0, stepsVals: [], moves: {} };
  for (let i = 0; i < 7; i++) {
    const ds = addDays(weekEnd, -i);
    if (state.journal.some(j => j.date === ds && j.kind === 'reflection')) st.refl++;
    const d = peekDay(ds);
    st.anchorsTotal += ANCHORS.length;
    if (!d) continue;
    if (dayHasData(d)) st.logged++;
    const iv = intakeOf(d); if (iv != null) st.intakeVals.push(iv);
    const nv = netOf(d); if (nv != null) st.netVals.push(nv);
    ANCHORS.forEach(a => { if (d.anchors && d.anchors[a.id]) st.anchorsKept++; });
    if (d.hard || d.night) st.hard++;
    if (d.rest) st.rest++;
    if (d.untracked) st.untracked++;
    st.habits += (d.habits || []).length;
    st.focuses += (d.focusDone || []).length;
    if (d.steps != null) st.stepsVals.push(Number(d.steps));
    const types = new Set([...(d.moveTypes || []), ...(d.sessions || []).map(x => x.type)]);
    types.forEach(tp => { st.moves[tp] = (st.moves[tp] || 0) + 1; });
  }
  return st;
}
function composeWeekLetter(weekEnd) {
  const st = weekStatsFor(weekEnd);
  const cfg = state.config;
  const avg = st.intakeVals.length ? Math.round(st.intakeVals.reduce((a, b) => a + b, 0) / st.intakeVals.length) : null;
  const avgNet = st.netVals.length ? Math.round(st.netVals.reduce((a, b) => a + b, 0) / st.netVals.length) : null;
  const range = fmtShort(addDays(weekEnd, -6)) + ' – ' + fmtShort(weekEnd);
  const p = [];
  p.push('Dear ' + cfg.name + ',');
  p.push('This is the week of ' + range + ', written down so you don’t have to carry it in your head.');
  if (avg != null) {
    if (avg >= cfg.idealMin) p.push('You averaged ' + avg + ' kcal a day — maintenance territory, the actual engine of everything you’re rebuilding. That is the plan working, quietly.');
    else if (avg >= cfg.intakeMin) p.push('You averaged ' + avg + ' kcal a day — inside your range. The next soft step is leaning toward ' + cfg.idealMin + ', and only that.');
    else p.push('Intake ran low this week (' + avg + ' on average). Not an accusation — a flag. Nearly everything on the hard list gets easier with more food, not less.');
  } else if (st.untracked) {
    p.push('A largely untracked week — which, depending on where you stand on the journey, may be the most advanced thing on this page.');
  }
  if (st.logged && st.hard === 0) p.push('No hard nights were logged. Read that sentence twice.');
  else if (st.hard) p.push(st.hard + (st.hard === 1 ? ' night was hard' : ' nights were hard') + ' — and the days around them stayed ordinary. The hard nights aren’t the measure; the ordinary mornings after them are.');
  const mv = Object.keys(st.moves).map(k => k.toLowerCase() + ' ×' + st.moves[k]);
  if (mv.length || st.rest) p.push('You moved like this: ' + (mv.join(', ') || 'gently') + (st.rest ? ' — and took ' + st.rest + (st.rest === 1 ? ' real rest day.' : ' real rest days.') : '.'));
  if (st.habits || st.focuses || st.refl) p.push('For the inner ledger: ' + st.habits + ' moments that belonged to you, ' + st.focuses + ' gentle focuses done, ' + st.refl + (st.refl === 1 ? ' reflection written.' : ' reflections written.'));
  p.push(GENTLE_LINES[dayOfYear(weekEnd) % GENTLE_LINES.length]);
  p.push('— Tend');
  return { text: p.join('\n\n'), range, stats: {
    avgIntake: avg, avgNet,
    anchorsPct: st.anchorsTotal ? Math.round(st.anchorsKept / st.anchorsTotal * 100) : 0,
    hardDays: st.hard, restDays: st.rest, habits: st.habits, focuses: st.focuses
  } };
}
function maybeWeeklyLetter() {
  const weekEnd = lastSundayOnOrBefore(addDays(todayStr(), -1));
  if (state.journal.some(j => j.kind === 'letter' && j.weekEnd === weekEnd)) return;
  const st = weekStatsFor(weekEnd);
  if (!st.logged && !st.refl) return;
  const L = composeWeekLetter(weekEnd);
  state.journal.unshift({ id: uuid(), date: weekEnd, kind: 'letter', weekEnd, range: L.range, text: L.text, stats: L.stats });
  saveState();
}

/* Pull a schema.org Recipe out of a fetched page (JSON-LD) */
function parseRecipeFromHtml(pageHtml) {
  const re = /<script[^>]*type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
  const candidates = [];
  let m;
  while ((m = re.exec(pageHtml))) {
    try { candidates.push(JSON.parse(m[1].trim())); } catch (e) {}
  }
  let rec = null;
  const scan = (node) => {
    if (!node || rec) return;
    if (Array.isArray(node)) { node.forEach(scan); return; }
    if (typeof node === 'object') {
      const t = node['@type'];
      if (t === 'Recipe' || (Array.isArray(t) && t.includes('Recipe'))) { rec = node; return; }
      if (node['@graph']) scan(node['@graph']);
    }
  };
  candidates.forEach(scan);
  if (!rec) return null;
  let img = rec.image;
  if (Array.isArray(img)) img = img[0];
  if (img && typeof img === 'object') img = img.url || '';
  const inst = rec.recipeInstructions;
  let steps = '';
  if (typeof inst === 'string') steps = inst;
  else if (Array.isArray(inst)) steps = inst.map(x => typeof x === 'string' ? x : (x.text || x.name || '')).filter(Boolean).join('\n');
  return {
    title: rec.name || '',
    img: img || '',
    ingredients: (rec.recipeIngredient || []).join('\n'),
    steps
  };
}

/* Downscale to ~900px JPEG so pages stay light enough for local storage */
let pendingNoteImg = null;
function fileToDataUrl(file, cb) {
  const fr = new FileReader();
  fr.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 900;
      const sc = Math.min(1, max / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * sc); c.height = Math.round(img.height * sc);
      const ctx = c.getContext && c.getContext('2d');
      if (!ctx) { cb(fr.result); return; }
      ctx.drawImage(img, 0, 0, c.width, c.height);
      try { cb(c.toDataURL('image/jpeg', 0.78)); } catch (e) { cb(fr.result); }
    };
    img.onerror = () => cb(null);
    img.src = fr.result;
  };
  fr.readAsDataURL(file);
}

    }, 300);
  });

  root.querySelectorAll('[data-jdel]').forEach(b => b.addEventListener('click', () => {
    state.journal = state.journal.filter(j => j.id !== b.dataset.jdel);
    saveState(); renderJournal();
  }));
  root.querySelectorAll('[data-windel]').forEach(b => b.addEventListener('click', () => {
    state.wins = state.wins.filter(w => w.id !== b.dataset.windel);
    saveState(); renderJournal();
  }));

  const rcSave = root.querySelector('#rc-save');
  if (rcSave) rcSave.addEventListener('click', () => {
    const title = root.querySelector('#rc-title').value.trim();
    const ing = root.querySelector('#rc-ing').value.trim();
    const steps = root.querySelector('#rc-steps').value.trim();
    if (!title && !ing) { toast('A title or some ingredients, at least.'); return; }
    state.journal.unshift({ id: uuid(), date: todayStr(), kind: 'recipe', title,
      url: root.querySelector('#rc-url').value.trim(),
      img: root.querySelector('#rc-img').value.trim(),
      ingredients: ing, steps, tried: false });
    saveState(); toast('Recipe kept.'); renderJournal();
  });
  const rcImport = root.querySelector('#rc-import');
  if (rcImport) rcImport.addEventListener('click', async () => {
    const url = root.querySelector('#rc-url').value.trim();
    const msg = root.querySelector('#rc-import-msg');
    if (!url) { msg.textContent = 'Paste the recipe link first.'; return; }
    if (!state.config.sheetUrl) { msg.textContent = 'Import borrows your Google Sheet’s script to fetch pages — connect it in Settings first (and make sure it’s the latest script version).'; return; }
    msg.textContent = 'Fetching…';
    try {
      const res = await fetch(state.config.sheetUrl, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'fetchUrl', url }), redirect: 'follow'
      });
      const data = await res.json();
      if (!data.ok || !data.content) throw new Error(data.error || 'no content');
      const rec = parseRecipeFromHtml(data.content);
      if (!rec) { msg.textContent = 'That page didn’t offer its recipe in a readable form — copy and paste it below instead.'; return; }
      root.querySelector('#rc-title').value = rec.title || '';
      root.querySelector('#rc-img').value = rec.img || '';
      root.querySelector('#rc-ing').value = rec.ingredients || '';
      root.querySelector('#rc-steps').value = rec.steps || '';
      msg.textContent = '✓ Imported — look it over, then keep it.';
    } catch (e) {
      msg.textContent = 'Couldn’t fetch that page (' + e.message + '). If your script predates recipes, update it from Settings → setup. Or paste the recipe by hand.';
    }
  });
  root.querySelectorAll('[data-rtried]').forEach(ch => ch.addEventListener('click', () => {
    const r = state.journal.find(x => x.id === ch.dataset.rtried);
    if (r) { r.tried = !r.tried; saveState(); renderJournal(); if (r.tried) toast('Cooked. That counts twice — food and life.'); }
  }));

  let winTag = null;
  root.querySelectorAll('#j-win-tags .chip').forEach(ch => ch.addEventListener('click', () => {
    const was = ch.classList.contains('selected');
    root.querySelectorAll('#j-win-tags .chip').forEach(x => x.classList.remove('selected'));
    if (was) { winTag = null; } else { ch.classList.add('selected'); winTag = ch.dataset.wtag; }
  }));
  const ws = root.querySelector('#j-win-save');
  if (ws) ws.addEventListener('click', () => {
    const v = root.querySelector('#j-win').value.trim();
    if (!v) { toast('Write the win first.'); return; }
    if (!winTag) { toast('Give it a tag — food, body, people, or life.'); return; }
    state.wins.unshift({ id: uuid(), date: todayStr(), text: v, tag: winTag });
    saveState(); toast('Evidence logged.'); renderJournal();
  });
  const wr = root.querySelector('#j-win-random');
  if (wr) wr.addEventListener('click', () => {
    const w = state.wins[Math.floor(Math.random() * state.wins.length)];
    openModal('<div class="modal-head"><h2>It happened. It counts.</h2><button class="x-btn" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
      '<div class="modal-body"><p class="gentle-line" style="font-size:var(--fs-lg);">' + esc(w.text) + '</p>' +
      '<p class="small">' + fmtShort(w.date) + ' · ' + esc(w.tag) + '</p></div>');
  });
}

/* =============================================================
   SELÍDES + SYLLOGÉS — the reading room & thread journal
   ============================================================= */
let selPrompt = null;       // {prompt, tag, src?} — what the page is being written against
let selThread = null;       // currently open thread in the prompt picker
let selShift = 0;           // “another one” offset
let pendingSelides = null;  // set by Today’s reading card before switching view
let selShelfOpen = {};      // which shelf folds are open — the shelf holds its place
let selShelfQuery = '';     // shelf search

function renderSelides() {
  const date = todayStr();
  if (pendingSelides) { selPrompt = pendingSelides; pendingSelides = null; }
  const q = questionnaireForDate(date);
  const wr = weeklyReading(date);
  const prevEl = document.getElementById('sc-text');
  const draft = prevEl ? prevEl.value : '';

  let html = '<h2 class="view-title">selídes + syllogés</h2>' +
    '<p class="view-sub">Pages and collections. Readings worth linering with + prompts from the eight threads + the questionnaire to oneself. Everything lands in the archive</p>';

  /* The questionnaire to oneself — hers, verbatim */
  html += '<div class="card wash-neutral" style="border-color:color-mix(in srgb, var(--plum) 32%, var(--line));"><div class="card-title">The questionnaire to oneself</div>' +
    '<p class="sq-q" style="margin-bottom:4px;border-left:3px solid var(--plum);padding-left:12px;">' + esc(q) + '</p>' +
    '<div class="caption" style="margin-bottom:2px;text-align:right;"><button class="eb-link" id="sq-all">all twelve</button> · <button class="eb-btn" id="sq-answer">answer it</button></div></div>';

  /* This week's reading */
  html += '<div class="card wash-heather"><div class="card-title"><span>This week’s reading</span></div>' +
    '<p class="sel-title">' + esc(wr.t) + '</p><p class="sel-author">' + esc(wr.a) + '</p>' +
    '<p class="small" style="margin:0 0 12px;color:var(--muted2);">' + esc(wr.why) + '</p>' +
    '<p class="gentle-line" style="margin-bottom:12px;">' + esc(wr.q) + '</p>' +
    '<div class="caption" style="margin-bottom:2px;text-align:right;">' + esc(wr.k) + ' · ' + esc(wr.th) + ' · ' +
    (weeklyReadingDone(date)
      ? 'completed · <button class="eb-btn" id="sr-write">revisit</button></div>' +
        '<div class="small" style="text-align:right;font-style:italic;color:var(--muted);margin:4px 0 0;">take your time with it</div></div>'
      : '<button class="eb-btn" id="sr-write">write from this</button></div></div>');

  /* Prompts by thread */
  html += '<div class="card"><div class="card-title">Prompts by thread</div>' +
    '<div class="chips" style="margin-bottom:4px;">' +
    THEMES.map(t => '<span class="chip' + (selThread === t.id ? ' selected' : '') + '" data-selth="' + t.id + '">' + t.name + '</span>').join('') + '</div>';
  if (selThread && THREAD_PROMPTS[selThread]) {
    const pool = THREAD_PROMPTS[selThread];
    const tp = pool[(dayOfYear(date) + selShift) % pool.length];
    html += '<p class="gentle-line" style="margin:12px 0;">' + esc(tp) + '</p>' +
      '<div style="display:flex;gap:12px;align-items:center;"><button class="eb-btn" id="st-write">write from this</button>' +
      '<button class="eb-link" id="st-shuffle">another one</button></div>';
  } else {
    html += '<p class="help" style="margin:8px 0 0;font-size:var(--fs-body-sm);color:var(--muted);">Pick a thread — each carries its own questions.</p>';
  }
  html += '</div>';

  /* The page — the writing box */
  html += '<div class="card"><div class="card-title">The page' + (selPrompt ? '<button class="ct-action" id="sc-clear">clear prompt</button>' : '') + '</div>';
  if (selPrompt) {
    if (selPrompt.src) html += '<div class="caption" style="margin-bottom:4px;">' + esc(selPrompt.src) + '</div>';
    html += '<p class="gentle-line" style="margin-bottom:12px;">' + esc(selPrompt.prompt) + '</p>';
  } else {
    html += '<p class="small" style="margin:0 0 12px;">No prompt chosen — a blank page is also allowed.</p>';
  }
  html += '<textarea id="sc-text" placeholder="Write toward it, around it, or against it. Arguing back counts.">' + esc(draft) + '</textarea>' +
    '<div class="btn-row right" style="margin-top:12px;"><button class="primary small" id="sc-save">Keep this page</button></div></div>';

  /* The shelf */
  html += '<h3>The shelf</h3><p class="small" style="margin:-4px 0 12px;">' + READINGS.length + ' readings, by thread. Tap one to open it.</p>';
  html += '<input type="search" id="sel-search" placeholder="Search the shelf…" value="' + esc(selShelfQuery) + '" style="margin-bottom:12px;">';
  const shelfRow = (x) => '<button class="sel-item" data-selopen="' + x.i + '" style="display:block;width:100%;text-align:left;background:none;border:none;border-top:1px dashed var(--line);border-radius:0;min-height:0;cursor:pointer;">' +
    '<span class="sel-title" style="font-size:var(--fs-body);display:block;">' + esc(x.r.t) + '</span>' +
    '<span class="sel-author" style="display:block;margin:2px 0 0;">' + esc(x.r.a) + ' · ' + esc(x.r.k) + '</span></button>';
  if (selShelfQuery.trim()) {
    const qy = selShelfQuery.toLowerCase();
    const ms = READINGS.map((r, i) => ({ r, i })).filter(x =>
      (x.r.t + ' ' + x.r.a + ' ' + x.r.k + ' ' + x.r.th + ' ' + x.r.why + ' ' + x.r.q).toLowerCase().includes(qy));
    html += ms.length
      ? '<div class="card" style="padding:8px 16px;">' + ms.map(shelfRow).join('') + '</div>'
      : '<p class="small">Nothing on the shelf matches that yet.</p>';
  } else {
    THEMES.forEach(t => {
      const rs = READINGS.map((r, i) => ({ r, i })).filter(x => x.r.th === t.id);
      if (!rs.length) return;
      html += '<details class="fold" data-fold="' + t.id + '"' + (selShelfOpen[t.id] ? ' open' : '') + '><summary>' + esc(t.name) + ' — ' + rs.length + '</summary><div class="fold-body">' +
        rs.map(shelfRow).join('') +
        '</div></details>';
    });
  }

  /* Recent pages */
  const pages = state.journal.filter(j => j.kind === 'study');
  if (pages.length) {
    html += '<h3>Recent pages</h3>';
    pages.slice(0, 20).forEach(j => { html += journalEntryHtml(j); });
  }

  document.getElementById('view-selides').innerHTML = html;
  bindSelides();
}

function bindSelides() {
  const root = document.getElementById('view-selides');
  root.querySelectorAll('[data-go]').forEach(b => b.addEventListener('click', () => switchView(b.dataset.go)));

  const focusPage = () => { const t = root.querySelector('#sc-text'); if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); t.focus({ preventScroll: true }); } };

  const sqAll = root.querySelector('#sq-all');
  if (sqAll) sqAll.addEventListener('click', () => {
    openModal('<div class="modal-head"><h2>The questionnaire to oneself</h2><button class="x-btn" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
      '<div class="modal-body"><p class="small" style="margin:0 0 12px;">Tap one to answer it.</p>' +
      QUESTIONNAIRE.map((qq, i) => '<button class="sel-item" data-sqpick="' + i + '" style="display:block;width:100%;text-align:left;background:none;border:none;border-radius:0;min-height:0;padding:12px 0;cursor:pointer;"><span class="sq-q" style="font-size:var(--fs-body);margin:0;display:block;">' + esc(qq) + '</span></button>').join('') +
      '</div>');
    document.querySelectorAll('[data-sqpick]').forEach(b => b.addEventListener('click', () => {
      selPrompt = { prompt: QUESTIONNAIRE[Number(b.dataset.sqpick)], tag: 'questionnaire' };
      closeModal(); renderSelides();
      const t = document.querySelector('#view-selides #sc-text'); if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); t.focus({ preventScroll: true }); }
    }));
  });

  const sqAnswer = root.querySelector('#sq-answer');
  if (sqAnswer) sqAnswer.addEventListener('click', () => {
    selPrompt = { prompt: questionnaireForDate(todayStr()), tag: 'questionnaire' };
    renderSelides();
    const t = document.querySelector('#view-selides #sc-text'); if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); t.focus({ preventScroll: true }); }
  });

  const srWrite = root.querySelector('#sr-write');
  if (srWrite) srWrite.addEventListener('click', () => {
    const wr = weeklyReading(todayStr());
    selPrompt = { prompt: wr.q, tag: wr.th, src: wr.t + ' — ' + wr.a };
    renderSelides();
    const t = document.querySelector('#view-selides #sc-text'); if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); t.focus({ preventScroll: true }); }
  });

  root.querySelectorAll('[data-selth]').forEach(ch => ch.addEventListener('click', () => {
    selThread = selThread === ch.dataset.selth ? null : ch.dataset.selth;
    selShift = 0;
    renderSelides();
  }));
  const stShuffle = root.querySelector('#st-shuffle');
  if (stShuffle) stShuffle.addEventListener('click', () => { selShift++; renderSelides(); });
  const stWrite = root.querySelector('#st-write');
  if (stWrite) stWrite.addEventListener('click', () => {
    const pool = THREAD_PROMPTS[selThread];
    selPrompt = { prompt: pool[(dayOfYear(todayStr()) + selShift) % pool.length], tag: selThread };
    renderSelides();
    const t = document.querySelector('#view-selides #sc-text'); if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); t.focus({ preventScroll: true }); }
  });

  root.querySelectorAll('details[data-fold]').forEach(d => d.addEventListener('toggle', () => {
    selShelfOpen[d.dataset.fold] = d.open;
  }));

  const ss = root.querySelector('#sel-search');
  if (ss) ss.addEventListener('input', () => {
    selShelfQuery = ss.value;
    clearTimeout(ss._t);
    ss._t = setTimeout(() => {
      renderSelides();
      const s2 = document.getElementById('sel-search');
      if (s2) { s2.focus(); s2.setSelectionRange(s2.value.length, s2.value.length); }
    }, 280);
  });

  root.querySelectorAll('[data-selopen]').forEach(b => b.addEventListener('click', () => {
    openReadingModal(Number(b.dataset.selopen));
  }));

  const scClear = root.querySelector('#sc-clear');
  if (scClear) scClear.addEventListener('click', () => { selPrompt = null; renderSelides(); });

  const scSave = root.querySelector('#sc-save');
  if (scSave) scSave.addEventListener('click', () => {
    const t = root.querySelector('#sc-text');
    const text = (t.value || '').trim();
    if (!text) { toast('One sentence is enough — but it does want at least that.'); return; }
    state.journal.unshift({
      id: uuid(), date: todayStr(), kind: 'study',
      prompt: selPrompt ? selPrompt.prompt : null,
      src: selPrompt ? (selPrompt.src || null) : null,
      tag: selPrompt ? selPrompt.tag : 'page',
      text
    });
    saveState();
    selPrompt = null;
    renderSelides();
    toast('Kept, with its question. It’s in the archive.');
  });

  root.querySelectorAll('[data-jdel]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    state.journal = state.journal.filter(j => j.id !== b.dataset.jdel);
    saveState(); renderSelides();
  }));
}

  openModal(
    '<div class="modal-head"><h2 style="font-family:var(--font-serif);font-weight:500;">' + esc(r.t) + '</h2>' +

    '<div class="modal-body">' +

    '<p class="small" style="margin:0 0 12px;">' + esc(r.why) + '</p>' +
    '<p class="gentle-line">' + esc(r.q) + '</p>' +

}

/* =============================================================
   AT THE TABLE — meal check-in, from the I NEED list
   ============================================================= */
let tblMeal = null;
function defaultTableMeal() {
  const h = new Date().getHours();
  return h < 11 ? 'b' : h < 15 ? 'l' : h < 21 ? 'd' : 's';
}

function hfRow(scale, val) {
  let dots = '';
  for (let i = 1; i <= HF_STOPS; i++) {
    const size = Math.round(12 + i * 1.6);
    dots += '<button class="hf-dot' + (val >= i ? ' on' : '') + '" data-hfs="' + scale + '" data-hfv="' + i +
      '" style="width:' + size + 'px;height:' + size + 'px;" aria-label="' + i + ' of ' + HF_STOPS + '"></button>';
  }
  return '<div class="hf-row"><span class="hf-end">hollow</span><div class="hf-dots">' + dots + '</div><span class="hf-end">full</span></div>';
}

function mealChecksHtml(d) {
  if (!d || !d.mealChecks) return '';
  const order = ['b', 'l', 'd', 's'];
  const rows = order.filter(k => d.mealChecks[k] && Object.keys(d.mealChecks[k]).length).map(k => {
    const m = d.mealChecks[k];
    const name = (MEAL_TEMPLATE.find(x => x.id === k) || {}).name || k;
    const bits = [];
    if (m.hb != null || m.ha != null) bits.push('hunger ' + (m.hb != null ? m.hb : '–') + ' → ' + (m.ha != null ? m.ha : '–'));
    const settled = m.settle ? Object.values(m.settle).filter(Boolean).length : 0;
    if (settled) bits.push(settled + '/' + TABLE_SETTLE.length + ' settled');
    if (m.listening) bits.push('listening: ' + esc(m.listening));
    if (m.word) bits.push('“' + esc(m.word) + '”');
    if (m.sense) bits.push(esc(m.sense));
    if (!bits.length && !m.note) return '';
    return '<p style="margin:0 0 8px;font-size:var(--fs-body-sm);color:var(--ink-2);"><strong>' + esc(name) + '</strong> — ' + bits.join(' · ') +
      (m.note ? '<br><span class="small">' + esc(m.note) + '</span>' : '') + '</p>';
  }).filter(Boolean);
  return rows.join('');
}

function renderTable() {
  const date = todayStr();
  const day = getDay(date);
  if (!tblMeal) tblMeal = defaultTableMeal();
  const mc = day.mealChecks[tblMeal] || {};
  const line = TABLE_LINES[(dayOfYear(date) + ['b', 'l', 'd', 's'].indexOf(tblMeal)) % TABLE_LINES.length];

  let html = '<h2 class="view-title">at the table</h2>' +
    '<p class="view-sub">From your own list: plated, seated, accompanied — ten unhurried minutes that belong to the meal. Everything here saves itself and folds into the day’s log.</p>';

  html += '<div class="card wash-heather"><p class="gentle-line" style="font-size:var(--fs-lg);margin:0;">' + esc(line) + '</p></div>';

  html += '<div class="card"><div class="card-title">Which meal</div><div class="chips">' +
    MEAL_TEMPLATE.map(m => '<span class="chip' + (tblMeal === m.id ? ' selected' : '') + '" data-tmeal="' + m.id + '">' + m.name + '</span>').join('') +
    '</div></div>';

  html += '<div class="card"><div class="card-title">Arriving<span class="caption">before</span></div>' +
    '<span class="mini-lbl">How hungry?</span>' + hfRow('hb', mc.hb) +
    '<div style="margin-top:16px;">' +
    TABLE_SETTLE.map(s => checkRow('ts-' + s.id, s.label, null, !!(mc.settle && mc.settle[s.id]))).join('') + '</div>' +
    '<div style="margin-top:16px;"><span class="mini-lbl">What’s playing</span>' +
    '<input type="text" id="t-listen" value="' + esc(mc.listening || '') + '" placeholder="music, a podcast, the rain"></div></div>';

  html += '<div class="card"><div class="card-title">Leaving<span class="caption">after</span></div>' +
    '<span class="mini-lbl">How full?</span>' + hfRow('ha', mc.ha) +
    '<div class="input-grid-2" style="margin-top:16px;">' +
    '<div><span class="mini-lbl">One word for it</span><input type="text" id="t-word" value="' + esc(mc.word || '') + '" placeholder="e.g. fine, warm, loud"></div>' +
    '<div><span class="mini-lbl">Where it sits</span><input type="text" id="t-sense" value="' + esc(mc.sense || '') + '" placeholder="warmth, ease, knot, hum"></div></div>' +
    '<div style="margin-top:16px;"><span class="mini-lbl">Anything worth keeping (optional)</span>' +
    '<textarea id="t-note" style="min-height:60px;" placeholder="A sentence is plenty.">' + esc(mc.note || '') + '</textarea></div></div>';

  html += '<div class="btn-row"><button class="primary" id="t-done">Done — it’s in the day</button></div>';
  html += '<p class="small" style="margin:12px 0 0;color:var(--muted);">Arriving at the table is the practice.</p>';

  document.getElementById('view-table').innerHTML = html;
  bindTable();
}

function bindTable() {
  const root = document.getElementById('view-table');
  const mcOf = () => {
    const day = getDay(todayStr());
    if (!day.mealChecks[tblMeal]) day.mealChecks[tblMeal] = {};
    const m = day.mealChecks[tblMeal];
    if (!m.time) m.time = new Date().toTimeString().slice(0, 5);
    return m;
  };

  root.querySelectorAll('[data-tmeal]').forEach(ch => ch.addEventListener('click', () => {
    tblMeal = ch.dataset.tmeal; renderTable();
  }));

  root.querySelectorAll('[data-hfs]').forEach(b => b.addEventListener('click', () => {
    const m = mcOf();
    const scale = b.dataset.hfs, v = Number(b.dataset.hfv);
    m[scale] = (m[scale] === v) ? null : v;   // tap the same dot to unset
    saveState(); renderTable();
  }));

  root.onchange = (e) => {
    const t = e.target;
    if (!t || !t.id) return;
    if (t.id.startsWith('ts-')) {
      const m = mcOf();
      if (!m.settle) m.settle = {};
      m.settle[t.id.slice(3)] = t.checked;
      saveState();
    }
    if (t.id === 't-listen') { mcOf().listening = t.value.trim(); saveState(); }
    if (t.id === 't-word')   { mcOf().word = t.value.trim(); saveState(); }
    if (t.id === 't-sense')  { mcOf().sense = t.value.trim(); saveState(); }
    if (t.id === 't-note')   { mcOf().note = t.value.trim(); saveState(); }
  };

  const done = root.querySelector('#t-done');
  if (done) done.addEventListener('click', () => {
    toast('Folded into today’s log. Gently done.');
    switchView('today');
  });
}

/* =============================================================
   ARCHIVE — the whole record as a mosaic
   ============================================================= */
let archLimit = 60;
let archQuery = '';
let archFilter = 'all';
const ARCH_FILTERS = [
  ['all', 'everything'], ['day', 'days'], ['reflection', 'reflections'],
  ['study', 'selídes'], ['note', 'notebook'], ['win', 'evidence']
];
function archFilterMatch(it) {
  if (archFilter === 'all') return true;
  if (archFilter === 'reflection') return it.kind === 'reflection' || it.kind === 'letter';
  if (archFilter === 'note') return it.kind === 'note' || it.kind === 'recipe';
  return it.kind === archFilter;
}

function archSearchable(item) {
  if (item.kind === 'day') {
    const d = item.obj;
    return [d.date, d.note, d.workoutText, (d.habits || []).join(' '), (d.moveTypes || []).join(' '),
      Object.values(d.focusTexts || {}).map(f => f.text).join(' '),
      (d.sessions || []).map(x => x.type + ' ' + (x.detail || '')).join(' ')].join(' ').toLowerCase();
  }
  const j = item.obj;
  return [j.date, j.text, j.prompt, j.src, j.title, j.ingredients, j.steps, j.tag, j.range].filter(Boolean).join(' ').toLowerCase();
}

function archItems() {
  const items = [];
  Object.values(state.days).forEach(d => {
    if (dayHasData(d) || (d.focusDone || []).length) items.push({ date: d.date, rank: 0, kind: 'day', obj: d });
  });
  state.journal.forEach(j => items.push({ date: j.date, rank: j.kind === 'letter' ? 0.5 : j.kind === 'reflection' ? 1 : 2, kind: j.kind, obj: j }));
  state.wins.forEach(w => items.push({ date: w.date, rank: 3, kind: 'win', obj: w }));
  items.sort((a, b) => b.date === a.date ? a.rank - b.rank : (b.date > a.date ? 1 : -1));
  return items;
}

function archTileHtml(item) {
  const d8 = fmtDate(item.date, { month: 'short', day: 'numeric', year: '2-digit' });
  if (item.kind === 'day') {
    const d = item.obj;
    const i = intakeOf(d), n = netOf(d);
    const dots = calDayDots(d.date).map(c => '<span class="cal-dot ' + c + '"></span>').join('');
    const bits = [];
    if (d.untracked) bits.push('untracked, on purpose');
    else if (i != null) bits.push(i + ' in' + (n != null ? ' · ' + (n > 0 ? '+' : '') + n : ''));
    if (d.steps != null) bits.push(Math.round(d.steps / 1000) + 'k steps');
    if (d.workoutText) bits.push(esc(d.workoutText));
    (d.sessions || []).forEach(x => bits.push(esc(x.type) + (x.mins ? ' ' + x.mins + 'm' : '')));
    const feel = feelLabels(d).join(', ');
    return '<button class="arch-tile t-day" data-arch="day" data-aid="' + d.date + '">' +
      '<div class="at-date"><span>' + d8 + '</span><span class="cal-dots">' + dots + '</span></div>' +
      '<div class="at-stats">' + (bits.join(' · ') || 'logged') + (feel ? ' · felt ' + feel : '') + '</div>' +
      (d.note ? '<div class="at-text" style="margin-top:8px;">' + esc(d.note) + '</div>' : '') +
      '</button>';
  }
  if (item.kind === 'reflection') {
    const j = item.obj;
    return '<button class="arch-tile t-reflect" data-arch="journal" data-aid="' + j.id + '">' +
      '<div class="at-date"><span>' + d8 + '</span><span class="win-tag">reflection</span></div>' +
      (j.prompt ? '<div class="at-text" style="font-style:italic;color:var(--plum-deep);opacity:.85;-webkit-line-clamp:2;margin-bottom:4px;">' + esc(j.prompt) + '</div>' : '') +
      '<div class="at-text">' + esc(j.text) + '</div></button>';
  }
  if (item.kind === 'study') {
    const j = item.obj;
    return '<button class="arch-tile" style="border-left:3px solid var(--plum);border-radius:var(--radius-sm);" data-arch="journal" data-aid="' + j.id + '">' +
      '<div class="at-date"><span>' + d8 + '</span><span class="win-tag">' + esc(j.tag || 'selídes') + '</span></div>' +
      (j.src ? '<div class="at-text" style="font-family:var(--font-mono);font-size:var(--fs-caption);text-transform:uppercase;letter-spacing:var(--ls-caption);color:var(--muted);-webkit-line-clamp:1;margin-bottom:3px;">' + esc(j.src) + '</div>' : '') +
      (j.prompt ? '<div class="at-text" style="font-style:italic;color:var(--plum-deep);opacity:.85;-webkit-line-clamp:2;margin-bottom:4px;">' + esc(j.prompt) + '</div>' : '') +
      '<div class="at-text">' + esc(j.text) + '</div></button>';
  }
  if (item.kind === 'note') {
    const j = item.obj;
    if (j.img) {
      return '<button class="arch-tile arch-img" data-arch="journal" data-aid="' + j.id + '">' +
        '<img src="' + j.img + '" alt="notebook image">' +
        '<span class="at-cap">' + d8 + '</span>' +
        (j.text ? '<span class="at-hover">' + esc(j.text.slice(0, 320)) + '</span>' : '') +
        '</button>';
    }
    return '<button class="arch-tile" data-arch="journal" data-aid="' + j.id + '">' +
      '<div class="at-date"><span>' + d8 + '</span><span class="win-tag">notebook</span></div>' +
      '<div class="at-text">' + esc(j.text) + '</div></button>';
  }
  if (item.kind === 'letter') {
    const j = item.obj, st = j.stats || {};
    return '<button class="arch-tile" style="border-left:3px solid var(--accent);border-radius:var(--radius-sm);" data-arch="journal" data-aid="' + j.id + '">' +
      '<div class="at-date"><span>' + esc(j.range || d8) + '</span><span class="win-tag">letter</span></div>' +
      '<div class="at-stats">' + (st.avgIntake != null ? st.avgIntake + ' avg · ' : '') + (st.anchorsPct || 0) + '% anchors · ' + (st.habits || 0) + ' for you</div>' +
      '<div class="at-text" style="margin-top:8px;">' + esc(j.text) + '</div></button>';
  }
  if (item.kind === 'recipe') {
    const j = item.obj;
    if (j.img) {
      return '<button class="arch-tile arch-img" data-arch="journal" data-aid="' + j.id + '">' +
        '<img src="' + esc(j.img) + '" alt="recipe">' +
        '<span class="at-cap">' + esc(j.title || d8) + '</span>' +
        '<span class="at-hover">' + esc((j.ingredients || '').slice(0, 280)) + '</span></button>';
    }
    return '<button class="arch-tile" data-arch="journal" data-aid="' + j.id + '">' +
      '<div class="at-date"><span>' + d8 + '</span><span class="win-tag">recipe</span></div>' +
      '<div class="at-text">' + esc(j.title || '') + '</div></button>';
  }
  const w = item.obj;
  return '<button class="arch-tile t-win" data-arch="win" data-aid="' + w.id + '">' +
    '<div class="at-date"><span>' + d8 + '</span><span class="win-tag">' + esc(w.tag) + '</span></div>' +
    '<div class="at-text">' + esc(w.text) + '</div></button>';
}

function renderArchive() {
  const items = archItems();
  let html = '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
    '<h2 class="view-title" style="margin-bottom:8px;">archive</h2>' +
    '<span class="mini-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>' +
    '<input type="text" id="arch-search" placeholder="search" value="' + esc(archQuery) + '"></span></div>' +
    '<p class="view-sub">Everything, in order: the days as you held them, the pages you wrote, the evidence you kept. Tap any tile for the whole of it.</p>';
  const nStudy = state.journal.filter(j => j.kind === 'study').length;
  html += '<div class="chips" style="margin-bottom:16px;">' +
    ARCH_FILTERS.map(([k, l]) => '<span class="chip' + (archFilter === k ? ' selected' : '') + '" data-archf="' + k + '">' +
      (k === 'study' && nStudy ? l + ' · ' + nStudy : l) + '</span>').join('') + '</div>';
  let filtered = items.filter(archFilterMatch);
  if (archQuery) filtered = filtered.filter(it => archSearchable(it).includes(archQuery.toLowerCase()));
  if (!filtered.length) {
    html += '<div class="card soft"><p class="small" style="margin:0;">' + (archQuery ? 'Nothing matches that yet.' : 'Nothing here yet. It fills on its own — today is already on its way.') + '</p></div>';
  } else {
    html += '<div class="arch-grid">' + filtered.slice(0, archLimit).map(archTileHtml).join('') + '</div>';
    if (filtered.length > archLimit) {
      html += '<div class="btn-row" style="margin-top:16px;justify-content:center;"><button class="small" id="arch-more">Show older</button></div>';
    }
  }
  document.getElementById('view-archive').innerHTML = html;
  const root = document.getElementById('view-archive');
  root.querySelectorAll('[data-arch]').forEach(tile => tile.addEventListener('click', () => {
    const kind = tile.dataset.arch, id = tile.dataset.aid;
    if (kind === 'day') { openDayModal(id); return; }
    if (kind === 'journal') {
      const j = state.journal.find(x => x.id === id);
      if (j) openJournalModal(j);
    }
    if (kind === 'win') {
      const w = state.wins.find(x => x.id === id);
      if (w) openModal('<div class="modal-head"><h2>It happened. It counts.</h2><button class="x-btn" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
        '<div class="modal-body"><p class="gentle-line" style="font-size:var(--fs-lg);">' + esc(w.text) + '</p><p class="small">' + fmtDate(w.date) + ' · ' + esc(w.tag) + '</p></div>');
    }
  }));
  root.querySelectorAll('[data-archf]').forEach(ch => ch.addEventListener('click', () => {
    archFilter = ch.dataset.archf; archLimit = 60; renderArchive();
  }));
  const more = root.querySelector('#arch-more');
  if (more) more.addEventListener('click', () => { archLimit += 60; renderArchive(); });
  const search = root.querySelector('#arch-search');
  if (search) search.addEventListener('input', () => {
    archQuery = search.value;
    clearTimeout(search._t);
    search._t = setTimeout(() => {
      renderArchive();
      const s2 = document.getElementById('arch-search');
      if (s2) { s2.focus(); s2.setSelectionRange(s2.value.length, s2.value.length); }
    }, 300);
  });
}

function openJournalModal(j) {
  if (j.kind === 'recipe') {
    openModal(
      '<div class="modal-head"><h2>' + esc(j.title || 'Recipe') + '</h2>' +
      '<button class="x-btn" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
      '<div class="modal-body">' +
      (j.img ? '<img src="' + esc(j.img) + '" style="width:100%;border-radius:10px;margin-bottom:12px;display:block;">' : '') +

  }
  openModal(
    '<div class="modal-head"><h2>' + (j.kind === 'reflection' ? 'Reflection' : j.kind === 'letter' ? 'A letter about your week' : j.kind === 'study' ? 'selídes + syllogés' : 'Notebook') + '</h2>' +
    '<button class="x-btn" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
    '<div class="modal-body">' +
    '<p class="caption" style="margin:0 0 12px;">' + esc(fmtDate(j.date)) + (j.kind === 'study' && j.tag ? ' · ' + esc(j.tag) : '') + '</p>' +
    (j.img ? '<img src="' + j.img + '" style="width:100%;border-radius:10px;margin-bottom:12px;display:block;">' : '') +
    (j.src ? '<p class="caption" style="margin:0 0 4px;">' + esc(j.src) + '</p>' : '') +
    (j.prompt ? '<p class="gentle-line" style="margin-bottom:12px;">' + esc(j.prompt) + '</p>' : '') +
    '<p style="white-space:pre-wrap;color:var(--ink);">' + esc(j.text) + '</p>' +
    '</div>'
  );
